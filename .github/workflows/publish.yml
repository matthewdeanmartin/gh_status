# .github/workflows/publish-llm-feeds.yml
name: Publish LLM Feeds

on:
  # Run automatically every day at 5:00 PM America/New_York.
  # GitHub Actions schedules are UTC, so we trigger at both possible UTC hours
  # and let the CLI's local-time guard skip the off-hour run.
  schedule:
    - cron: '0 21,22 * * *'

  # Allow running this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy Feeds
    runs-on: ubuntu-latest
    # Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read     # To checkout the repository
      pages: write        # To deploy to Pages
      id-token: write     # To verify the deployment is coming from the correct source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name:  checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.x
        uses: actions/setup-python@0b93645e9fea7318ecaed2be359559fd225c90a2 # v5.3.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install .

      - name: Run feed generator (scheduled)
        # This step runs for the daily cron schedule.
        # The Python script's internal time guard will ensure it only
        # generates content at the correct local hour.
        if: github.event_name == 'schedule'
        run: gh-status
        env:
          # The script uses the repository owner as the username.
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TZ_NAME: "America/New_York"

      - name: Run feed generator (manual)
        # This step runs for manual `workflow_dispatch` events.
        # It passes --force to bypass the script's internal time guard.
        if: github.event_name == 'workflow_dispatch'
        run: gh-status --force
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TZ_NAME: "America/New_York"

      - name: Set up Node.js
        uses: actions/setup-node@398f52985d8b053235c79c4653619d337392c57f # v4.1.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build:web

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dee4621055ee # v3.0.0
        with:
          # Upload the 'docs' directory
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6d577ef5e26a4709c06e9e56f7718d327d9735e # v4.0.5
